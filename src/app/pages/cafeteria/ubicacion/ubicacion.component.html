<div class="w-full">

  <!-- ================= HERO CORTO ================= -->
  <section class="relative flex min-h-[40vh] w-full flex-col justify-end overflow-hidden bg-[#1C1310] px-6 pb-10 pt-28 text-[#FAF8F5] sm:px-10 lg:px-16">
    <div class="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_15%_25%,#3a4b33_0%,transparent_45%)] opacity-60"></div>

    <div class="relative z-10">
      <span class="mb-4 inline-block border border-[#84745c]/50 px-3 py-1 font-['Inter'] text-[11px] uppercase tracking-[0.25em] text-[#c1b999]">
        Visítanos
      </span>
      <h1 class="font-['Fraunces'] text-4xl font-semibold text-[#FAF8F5] sm:text-5xl">
        Horarios y ubicación
      </h1>
    </div>
  </section>

  <!-- ================= CONTENIDO ================= -->
  <section class="bg-[#FAF8F5] px-6 py-16 dark:bg-[#0F0D0C] sm:px-10 lg:px-16">
    <div class="mx-auto grid max-w-6xl gap-10 lg:grid-cols-[0.9fr_1.1fr] lg:items-start">

      <!-- Columna izquierda: dirección + horario -->
      <div>
        <div class="border border-[#84745c]/25 bg-white p-6 dark:bg-[#1A1512]">
          <span class="font-['Inter'] text-[11px] uppercase tracking-[0.25em] text-[#84745c]">Dirección</span>
          <p class="mt-2 font-['Fraunces'] text-xl font-semibold text-[#43331b] dark:text-[#c1b999]">
            Chaullabamba, Cuenca
          </p>
          <p class="mt-1 font-['Inter'] text-sm text-[#716149] dark:text-[#c1b999]/70">
            Ecuador
          </p>

          <a [href]="directionsUrl" target="_blank" rel="noopener"
             class="mt-5 inline-flex items-center gap-2 bg-[#43331b] px-5 py-2.5 font-['Inter'] text-sm font-medium uppercase tracking-wide text-[#FAF8F5] transition-colors hover:bg-[#84745c]">
            Cómo llegar
          </a>
        </div>

        <div class="mt-6 border border-[#84745c]/25 bg-white p-6 dark:bg-[#1A1512]">
          <span class="font-['Inter'] text-[11px] uppercase tracking-[0.25em] text-[#84745c]">Horario de atención</span>
          <ul class="mt-3 divide-y divide-[#84745c]/15 font-['Inter'] text-sm">
            @for (h of horario; track h.dia) {
              <li class="flex items-center justify-between py-2.5">
                <span class="text-[#43331b] dark:text-[#c1b999]">{{ h.dia }}</span>
                @if (h.cerrado) {
                  <span class="text-[#84745c]">Cerrado</span>
                } @else {
                  <span class="text-[#716149] dark:text-[#c1b999]/70">{{ h.horas }}</span>
                }
              </li>
            }
          </ul>
        </div>
      </div>

      <!-- Columna derecha: mapa -->
      <div class="h-[420px] w-full overflow-hidden border border-[#84745c]/25 lg:h-full lg:min-h-[500px]">
        <iframe
          [src]="mapUrlSegura"
          class="h-full w-full grayscale-[15%]"
          style="border:0;"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          allowfullscreen>
        </iframe>
      </div>

    </div>
  </section>

</div>
