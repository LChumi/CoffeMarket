<div class="relative w-full max-w-[1600px] mx-auto overflow-hidden rounded-2xl" id="carousel">

  <!-- Track de slides -->
  <div class="flex transition-transform duration-700 ease-[cubic-bezier(0.4,0,0.2,1)] will-change-transform"
       [style.transform]="'translateX(-' + currentSlide * 100 + '%)'">

    @for (slide of slides; track slide.id) {
      <div class="relative min-w-full overflow-hidden"
           style="height: 60vh; min-height: 360px;">

        <!-- Imagen de fondo -->
        <div class="absolute inset-0 bg-cover bg-center transition-transform duration-[6000ms] ease-out"
             [class.scale-105]="currentSlide === $index"
             [style.backgroundImage]="'url(' + slide.image + ')'">
        </div>

        <!-- Overlay gradiente -->
        <div class="absolute inset-0"
             style="background: linear-gradient(105deg, rgba(30,16,8,0.72) 0%, rgba(30,16,8,0.35) 55%, transparent 100%);">
        </div>

        <!-- Contenido -->
        <div class="relative z-10 flex items-center h-full px-10 md:px-16">
          <div class="max-w-lg transition-all duration-500"
               [class.opacity-100]="currentSlide === $index"
               [class.opacity-0]="currentSlide !== $index"
               [class.translate-y-0]="currentSlide === $index"
               [class.translate-y-4]="currentSlide !== $index">

            <!-- Eyebrow pill -->
            <div class="inline-flex items-center gap-2 mb-4 px-3.5 py-1.5 rounded-full text-[11px] font-semibold tracking-widest uppercase text-[#E8D5C4]"
                 style="background: rgba(179,151,126,0.22); border: 0.5px solid rgba(179,151,126,0.45); backdrop-filter: blur(8px);">
              <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24">
                <path fill-rule="evenodd" d="M14 7h-4v3a1 1 0 0 1-2 0V7H6a1 1 0 0 0-.997.923l-.917 11.924A2 2 0 0 0 6.08 22h11.84a2 2 0 0 0 1.994-2.153l-.917-11.924A1 1 0 0 0 18 7h-2v3a1 1 0 1 1-2 0V7Zm-2-3a2 2 0 0 0-2 2v1H8V6a4 4 0 0 1 8 0v1h-2V6a2 2 0 0 0-2-2Z" clip-rule="evenodd"/>
              </svg>
              {{ slide.eyebrow }}
            </div>

            <!-- Título -->
            <h2 class="text-4xl md:text-5xl font-bold text-white leading-tight tracking-tight mb-6">
              {{ slide.title }}
            </h2>

            <!-- CTA -->
            <a [routerLink]="['/products']"
               class="inline-flex items-center gap-2.5 px-5 py-2.5 rounded-xl
                      bg-[#B3977E] hover:bg-[#8B6E56]
                      text-white text-sm font-semibold
                      transition-all duration-150 hover:-translate-y-0.5 group">
              {{ slide.cta }}
              <svg class="w-4 h-4 transition-transform duration-150 group-hover:translate-x-1"
                   fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </a>
          </div>
        </div>
      </div>
    }
  </div>

  <!-- Flecha anterior -->
  <button (click)="prev()"
          class="absolute left-4 top-1/2 -translate-y-1/2 z-10
                 w-11 h-11 rounded-full flex items-center justify-center
                 text-white transition-all duration-150"
          style="background: rgba(255,255,255,0.12); border: 0.5px solid rgba(255,255,255,0.25); backdrop-filter: blur(8px);"
          aria-label="Anterior">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
    </svg>
  </button>

  <!-- Flecha siguiente -->
  <button (click)="next()"
          class="absolute right-4 top-1/2 -translate-y-1/2 z-10
                 w-11 h-11 rounded-full flex items-center justify-center
                 text-white transition-all duration-150"
          style="background: rgba(255,255,255,0.12); border: 0.5px solid rgba(255,255,255,0.25); backdrop-filter: blur(8px);"
          aria-label="Siguiente">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
    </svg>
  </button>

  <!-- Indicadores (dots) -->
  <div class="absolute bottom-5 left-1/2 -translate-x-1/2 z-10 flex items-center gap-2">
    @for (slide of slides; track slide.id; let i = $index) {
      <button (click)="goTo(i)"
              class="h-1.5 rounded-full transition-all duration-300 border-0 cursor-pointer p-0"
              [ngClass]="{
          'w-6 bg-[#B3977E]': currentSlide === i,
          'w-1.5 bg-white/40': currentSlide !== i
        }"
              [attr.aria-label]="'Slide ' + (i + 1)">
      </button>
    }
  </div>

  <!-- Contador -->
  <div class="absolute bottom-5 right-6 z-10 text-xs font-medium tracking-wider"
       style="color: rgba(255,255,255,0.5);">
    <span class="text-white font-semibold">{{ (currentSlide + 1).toString().padStart(2,'0') }}</span>
    / {{ slides.length.toString().padStart(2,'0') }}
  </div>

  <!-- Barra de progreso -->
  <div class="absolute bottom-0 left-0 h-0.5 bg-[#B3977E] z-10 transition-none"
       [style.width.%]="progressWidth">
  </div>
</div>
