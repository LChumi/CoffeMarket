@if (showModal) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm p-3 sm:p-4 animate-fade-in"
    role="dialog"
    aria-modal="true"
    aria-labelledby="promo-title"
    (click)="close()"
  >
    <div
      class="relative w-full max-w-xs sm:max-w-sm overflow-hidden rounded-2xl bg-[#1A1512] border border-yellow-200/20 shadow-2xl shadow-yellow-200/10 animate-fade-in"
      (click)="$event.stopPropagation()"
    >
      <!-- Botón cerrar flotando sobre la imagen -->
      <button
        (click)="close()"
        autofocus
        aria-label="Cerrar"
        class="absolute top-3 right-3 z-10 flex h-9 w-9 items-center justify-center rounded-full bg-black/50 text-white backdrop-blur-sm transition-transform hover:scale-110 hover:bg-black/70 focus:outline-none focus:ring-2 focus:ring-yellow-200"
      >
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>

      <!-- Imagen a todo el ancho, proporción real 1080x1350 (4:5) -->
      <div class="relative w-full aspect-[4/5] bg-black">
        <img
          ngSrc="/images/background/proximamente.png"
          alt="Bunna Black Friday Logo"
          fill
          decoding="async"
          class="object-cover"
          priority/>

      </div>

      <!-- Contenido debajo -->
      <div class="p-5 text-center">
        <h2 id="promo-title" class="text-lg font-bold text-yellow-200">
          Algo especial está en camino
        </h2>
        <p class="mt-1.5 text-sm text-gray-300">
          Estamos preparando promociones exclusivas para ti. ¡Vuelve pronto!
        </p>

        <button
          (click)="close()"
          class="mt-4 w-full rounded-lg bg-yellow-200 px-4 py-3 text-sm font-semibold text-black transition-colors hover:bg-yellow-300"
        >
          Entendido
        </button>
      </div>
    </div>
  </div>
}
