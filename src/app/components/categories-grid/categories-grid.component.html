<!-- Product List Section: Categories Grid -->
<div class="container mx-auto px-4 py-10 lg:px-6 lg:py-16 xl:max-w-7xl">

  <!-- Header sección -->
  <div class="mb-10 flex items-end justify-between gap-6">
    <!-- Título -->
    <div>
      <p class="mb-2 text-xs font-semibold uppercase tracking-widest text-[#B3977E]">
        Nuestra selección
      </p>
      <h2 class="text-2xl font-bold tracking-tight text-gray-900 dark:text-white sm:text-3xl">
        Categorías
      </h2>
    </div>

    <!-- Línea decorativa -->
    <div class="hidden sm:block h-px flex-1 bg-gradient-to-r from-[#B3977E]/40 via-[#B3977E]/20 to-transparent"></div>

    <!-- Botón -->
    <a
      href="/products"
      class="inline-flex items-center gap-2 rounded-full border border-[#B3977E] px-5 py-2 text-sm font-medium text-[#B3977E] transition-all duration-300 hover:bg-[#B3977E] hover:text-white hover:shadow-md focus:outline-none focus:ring-2 focus:ring-[#B3977E]/50"
    >
      Ver todo
      <span class="text-lg leading-none">→</span>
    </a>
  </div>

  <!-- Grid -->
  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 md:grid-cols-3">
    @for (categoria of categorias; track $index) {
      <button
        (click)="goToProducts(categoria.id)"
        class="group relative block w-full overflow-hidden rounded-2xl
               ring-1 ring-black/5 dark:ring-white/10
               shadow-sm hover:shadow-xl
               transition-all duration-300 ease-out
               focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#B3977E]
               active:scale-[0.98]
               sm:col-span-2 md:col-span-1">

        <!-- Imagen -->
        <div class="relative aspect-[4/3] w-full overflow-hidden">
          <img
            [src]="'images/categories/' + categoria.nombre + '.webp'"
            alt="{{ categoria.nombre }}"
            loading="lazy"
            decoding="async"
            width="400"
            height="300"
            class="h-full w-full object-cover
                   transition-transform duration-500 ease-out
                   group-hover:scale-105"
          />

          <!-- Overlay base (siempre visible, oscurece parte inferior) -->
          <div class="absolute inset-0
                      bg-gradient-to-t from-black/60 via-black/10 to-transparent
                      transition-opacity duration-300
                      group-hover:opacity-80">
          </div>

          <!-- Overlay hover (color marca) -->
          <div class="absolute inset-0
                      bg-[#B3977E]/0
                      transition-all duration-300
                      group-hover:bg-[#B3977E]/25">
          </div>

          <!-- Contenido bottom -->
          <div class="absolute bottom-0 left-0 right-0 p-4
                      translate-y-1 group-hover:translate-y-0
                      transition-transform duration-300">

            <!-- Nombre -->
            <p class="text-base font-bold uppercase tracking-widest text-white
                      drop-shadow-sm mb-2">
              {{ categoria.nombre }}
            </p>

            <!-- CTA pill (aparece en hover) -->
            <div class="flex items-center gap-1.5
                        opacity-0 -translate-y-1
                        group-hover:opacity-100 group-hover:translate-y-0
                        transition-all duration-300 delay-75">
              <span class="text-xs font-semibold text-white/90">Ver productos</span>
              <svg class="w-3.5 h-3.5 text-[#E8D5C4]
                          transition-transform duration-200 group-hover:translate-x-0.5"
                   fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </div>
          </div>

          <!-- Ícono categoría (top-right, aparece en hover) -->
          <div class="absolute top-3 right-3
                      w-8 h-8 rounded-full
                      flex items-center justify-center
                      bg-white/0 backdrop-blur-sm
                      border border-white/0
                      opacity-0 scale-75
                      group-hover:opacity-100 group-hover:scale-100 group-hover:bg-white/15 group-hover:border-white/30
                      transition-all duration-300">
            <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24">
              <path fill-rule="evenodd"
                    d="M14 7h-4v3a1 1 0 0 1-2 0V7H6a1 1 0 0 0-.997.923l-.917 11.924A2 2 0 0 0 6.08 22h11.84a2 2 0 0 0 1.994-2.153l-.917-11.924A1 1 0 0 0 18 7h-2v3a1 1 0 1 1-2 0V7Zm-2-3a2 2 0 0 0-2 2v1H8V6a4 4 0 0 1 8 0v1h-2V6a2 2 0 0 0-2-2Z"
                    clip-rule="evenodd"/>
            </svg>
          </div>
        </div>
      </button>
    }
  </div>
</div>
<!-- END Product List Section: Categories Grid -->
